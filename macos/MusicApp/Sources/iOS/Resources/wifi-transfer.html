<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlaYer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
h1{font-size:28px;font-weight:700;margin-bottom:8px}
.sub{color:rgba(255,255,255,.4);font-size:14px;margin-bottom:40px}
.drop{width:100%;max-width:480px;border:2px dashed rgba(255,255,255,.15);border-radius:16px;padding:48px 24px;text-align:center;transition:all .2s;cursor:pointer}
.drop.over{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.04)}
.drop p{color:rgba(255,255,255,.5);font-size:15px}
.drop .ico{font-size:48px;margin-bottom:16px;opacity:.3}
.btn{display:inline-block;margin-top:20px;padding:10px 28px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:14px;font-weight:600;border-radius:24px;cursor:pointer}
.btn:hover{background:rgba(255,255,255,.2)}
input[type=file]{display:none}
.list{width:100%;max-width:480px;margin-top:24px}
.item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:6px}
.item .name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .st{font-size:12px;color:rgba(255,255,255,.4)}
.item .st.ok{color:#4ade80}
</style>
</head>
<body>
<h1>FlaYer</h1>
<p class="sub">Drop audio files to transfer</p>
<div class="drop" id="dz">
<div class="ico">&#9835;</div>
<p>Drag & drop files here</p>
<button class="btn" onclick="document.getElementById('fi').click()">Select Files</button>
<input type="file" id="fi" multiple accept="audio/*,.flac,.wav,.aiff,.aif,.alac,.m4a,.mp3">
</div>
<div class="list" id="fl"></div>
<script>
const dz=document.getElementById('dz'),fi=document.getElementById('fi'),fl=document.getElementById('fl');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');upload(e.dataTransfer.files)});
fi.addEventListener('change',()=>{upload(fi.files);fi.value=''});
function getPin(){
const q=new URLSearchParams(location.search).get('pin');
if(q&&/^\d{6}$/.test(q))return q;
let p=localStorage.getItem('flayerPin');
if(p&&/^\d{6}$/.test(p))return p;
p=prompt('Enter the 6-digit PIN shown in FlaYer Settings');
if(p&&/^\d{6}$/.test(p)){localStorage.setItem('flayerPin',p);return p;}
return null;
}
function upload(files){
const pin=getPin();
if(!pin)return;
for(const f of files){
const id='f-'+Math.random().toString(36).substr(2,9);
const el=document.createElement('div');el.className='item';
el.innerHTML='<span class="name">'+f.name+'</span><span class="st" id="'+id+'">Uploading...</span>';
fl.appendChild(el);
const fd=new FormData();fd.append('file',f);
fetch('/upload?pin='+encodeURIComponent(pin),{method:'POST',body:fd})
.then(r=>{if(r.status===401){localStorage.removeItem('flayerPin');throw new Error('auth');}return r;})
.then(()=>{document.getElementById(id).textContent='\u2713';document.getElementById(id).className='st ok'})
.catch(()=>{document.getElementById(id).textContent='Error';});
}}
</script>
</body>
</html>
