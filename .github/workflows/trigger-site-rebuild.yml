name: Trigger snitchteam.fr rebuild
on:
  release:
    types: [published]
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cloudflare Pages deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.PAGES_DEPLOY_HOOK }}" \
            --max-time 30 \
            -o /tmp/response.json
          echo "Response:"
          cat /tmp/response.json
